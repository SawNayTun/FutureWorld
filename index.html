    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @media print {
        body * {
          visibility: hidden;
        }
        .printable-area, .printable-area * {
          visibility: visible;
        }
        .printable-area {
          position: absolute;
          left: 20px;
          top: 20px;
          width: calc(100% - 40px);
          background: white !important;
          color: black !important;
          padding: 1rem;
          border: 1px solid #eee;
          border-radius: 8px;
        }
        .printable-area div, .printable-area p, .printable-area span, .printable-area h3, .printable-area h4, .printable-area h5 {
          color: black !important;
          background-color: transparent !important;
        }
        .printable-area .grid-cols-10 > div {
          border: 1px solid #ccc;
          background-color: #f0f0f0 !important;
        }
        .printable-area .text-yellow-300 { 
            font-weight: bold; 
            color: #000 !important;
        }
        .no-print { 
            display: none !important; 
        }
      }
    </style>
